name: Release

on:
  push:
    tags:
      - "v*.*.*"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  GHCR_REPO: ghcr.io/${{ github.repository_owner }}

jobs:
  build-and-push:
    name: Build and Push ${{ matrix.component }}
    runs-on: ubuntu-24.04
    permissions:
      packages: write
    strategy:
      matrix:
        include:
          - component: complik
            context: complik
            dockerfile: complik/Dockerfile
            pre-build: true
            build-cmd: CGO_ENABLED=0 GOOS=linux GOARCH=$TARGETARCH go build -trimpath -ldflags "-s -w" -o bin/service-complik-$TARGETARCH cmd/complik/main.go
          - component: procscan
            context: procscan
            dockerfile: procscan/Dockerfile
            pre-build: true
            build-cmd: CGO_ENABLED=0 GOOS=linux GOARCH=$TARGETARCH go build -trimpath -ldflags "-s -w" -o bin/service-procscan-$TARGETARCH cmd/procscan/main.go
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        if: ${{ matrix.pre-build }}
        uses: actions/setup-go@v6
        with:
          go-version-file: "go.work"

      - name: Pre-build binaries
        if: ${{ matrix.pre-build }}
        working-directory: ${{ matrix.context }}
        run: |
          for arch in amd64 arm64; do
            TARGETARCH=$arch
            CGO_ENABLED=0 GOOS=linux GOARCH=$TARGETARCH go build -trimpath -ldflags "-s -w" \
              -o bin/service-${{ matrix.component }}-$TARGETARCH cmd/*/main.go
          done

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.GHCR_REPO }}/${{ matrix.component }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
