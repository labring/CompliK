# =============================================================================
# ProcScan Security Scanner Configuration File
# =============================================================================
# Runtime notification and detection rule configuration is loaded from admin.

scanner:
  # Process filesystem path (container needs to mount host's /proc)
  proc_path: "/host/proc"
  # Scan interval (recommended: 30s-300s)
  scan_interval: "100s"
  # Log level (debug, info, warn, error)
  log_level: "debug"

actions:
  label:
    enabled: false
    data:
      clawcloud.run/status: "locked"

notifications:
  admin:
    base_url: "http://sealos-complik-admin:8080"
    timeout: "10s"
    basic_auth:
      username: "${ADMIN_BASIC_AUTH_USERNAME}"
      password: "${ADMIN_BASIC_AUTH_PASSWORD}"
