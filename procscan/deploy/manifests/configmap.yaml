apiVersion: v1
kind: ConfigMap
metadata:
  name: block-procscan-config
  namespace: block-system
data:
  config.yaml: |
    scanner:
      proc_path: "/host/proc"
      scan_interval: "1000s"
      log_level: "info"

    actions:
      label:
        enabled: false
        data:
          clawcloud.run/status: "locked"

    notifications:
      admin:
        base_url: "http://sealos-complik-admin:8080"
        timeout: "10s"
        basic_auth:
          username: "${ADMIN_BASIC_AUTH_USERNAME}"
          password: "${ADMIN_BASIC_AUTH_PASSWORD}"

    metrics:
      enabled: false
      port: 8080
      path: "/metrics"
      read_timeout: "10s"
      write_timeout: "10s"
      max_retries: 3
      retry_interval: "5s"
