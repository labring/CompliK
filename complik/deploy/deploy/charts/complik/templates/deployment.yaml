apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: {{ .Values.app.name }}
  name: {{ .Values.app.name }}-deployment
  namespace: {{ .Values.namespace }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: {{ .Values.app.name }}
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: {{ .Values.app.name }}
    spec:
      {{- if .Values.kubeconfig.useServiceAccount }}
      serviceAccountName: {{ .Values.rbac.name }}
      {{- end }}
      containers:
        - args:
            - --config=/config/config.yml
            {{- if not .Values.kubeconfig.useServiceAccount }}
            - --kubeconfig=/kubeconfig/{{ .Values.kubeconfig.configMapName }}
            {{- end }}
          command:
            - /manager
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          name: {{ .Values.app.name }}
          ports:
            - containerPort: {{ .Values.containerPort }}
              protocol: TCP
          env:
            - name: HOME
              value: {{ .Values.browserRuntime.home | quote }}
            - name: XDG_CACHE_HOME
              value: {{ .Values.browserRuntime.cacheHome | quote }}
            - name: ROD_BROWSER_BIN
              value: {{ .Values.browserRuntime.bin | quote }}
            {{- if .Values.external.admin.basicAuth.enabled }}
            - name: ADMIN_BASIC_AUTH_USERNAME
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.external.admin.basicAuth.secretName | quote }}
                  key: {{ .Values.external.admin.basicAuth.usernameKey | quote }}
            - name: ADMIN_BASIC_AUTH_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.external.admin.basicAuth.secretName | quote }}
                  key: {{ .Values.external.admin.basicAuth.passwordKey | quote }}
            {{- end }}
            - name: USE_SERVICE_ACCOUNT
              value: {{ .Values.kubeconfig.useServiceAccount | quote }}
            {{- if not .Values.kubeconfig.useServiceAccount }}
            - name: KUBECONFIG_PATH
              value: "/kubeconfig/{{ .Values.kubeconfig.configMapName }}"
            {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            runAsNonRoot: true
          terminationMessagePath: /dev/termination-log
          terminationMessagePolicy: File
          volumeMounts:
            - mountPath: /config
              name: config-vol
            {{- if not .Values.kubeconfig.useServiceAccount }}
            - mountPath: /kubeconfig
              name: kubeconfig-vol
              readOnly: true
            {{- end }}
      dnsPolicy: ClusterFirst
      restartPolicy: Always
      volumes:
        - configMap:
            defaultMode: 420
            name: {{ .Values.app.name }}-config
          name: config-vol
        {{- if not .Values.kubeconfig.useServiceAccount }}
        - configMap:
            defaultMode: 420
            name: {{ .Values.kubeconfig.configMapName }}
          name: kubeconfig-vol
        {{- end }}
